apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: kata-baked
spec:
  role: {{ .Values.karpenter.nodeRoleName | quote }}
  amiFamily: AL2023

  amiSelectorTerms:
    - ssmParameter: {{ .Values.kata.amiSSMParameter | quote }}

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.cluster.name | quote }}

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.cluster.name | quote }}

  # nodeadm NodeConfig — registers kata-clh and kata-qemu runtime handlers
  # in containerd before it starts. No runtime containerd restart needed.
  userData: |
    apiVersion: node.eks.aws/v1alpha1
    kind: NodeConfig
    spec:
      containerd:
        config: |
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-clh]
          runtime_type = "io.containerd.kata.v2"
          privileged_without_host_devices = true
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-clh.options]
          ConfigPath = "/etc/kata-containers/configuration.toml"

          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-qemu]
          runtime_type = "io.containerd.kata.v2"
          privileged_without_host_devices = true
          [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata-qemu.options]
          ConfigPath = "/etc/kata-containers/configuration-qemu.toml"

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        deleteOnTermination: true
        encrypted: true

  tags:
    Name: kata-baked-node
    Project: openclaw
    ManagedBy: karpenter
    KataPath: baked-ami
