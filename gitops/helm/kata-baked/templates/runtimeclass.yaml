# Isolated RuntimeClass for Wave 0 smoke-testing the baked-AMI path.
# Existing "kata-clh" RuntimeClass (from kata-deploy) is untouched.
# After Wave 3 cleanup we will rename this to plain "kata-clh".
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ .Values.runtimeClass.name }}
handler: {{ .Values.runtimeClass.handler }}
scheduling:
  nodeSelector:
    kata-pool: {{ .Values.pool.label | quote }}
  tolerations:
    - key: {{ .Values.pool.taintKey | quote }}
      operator: Equal
      value: "true"
      effect: NoSchedule
