# Job that patches aws-node DaemonSet affinity to include auto compute-type nodes
# Runs as ArgoCD PreSync hook so kata nodes get VPC CNI on every sync
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-node-patcher
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aws-node-patcher
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aws-node-patcher
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aws-node-patcher
subjects:
  - kind: ServiceAccount
    name: aws-node-patcher
    namespace: kube-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: aws-node-affinity-patch
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: aws-node-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              kubectl patch daemonset aws-node -n kube-system --type=json -p='[
                {"op":"replace","path":"/spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0","value":{"key":"eks.amazonaws.com/compute-type","operator":"In","values":["auto"]}}
              ]' && echo "aws-node affinity patched for kata nodes"
