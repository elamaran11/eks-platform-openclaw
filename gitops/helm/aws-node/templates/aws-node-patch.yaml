# PreSync hook Jobs that patch addon DaemonSet affinities to include auto compute-type nodes
# Required for kata nodes (self-managed Karpenter) to get VPC CNI and kube-proxy networking
# kube-proxy and aws-node addon schemas don't support affinity via configuration_values

apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-node-patcher
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aws-node-patcher
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aws-node-patcher
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aws-node-patcher
subjects:
  - kind: ServiceAccount
    name: aws-node-patcher
    namespace: kube-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: addon-affinity-patch
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: aws-node-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              # Patch aws-node: change NotIn[auto] -> In[auto]
              kubectl patch daemonset aws-node -n kube-system --type=json -p='[
                {"op":"replace","path":"/spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0","value":{"key":"eks.amazonaws.com/compute-type","operator":"In","values":["auto"]}}
              ]' && echo "aws-node affinity patched"

              # Patch kube-proxy: remove conflicting NotIn[auto] rule (index 2), keep In[auto] (index 0)
              kubectl patch daemonset kube-proxy -n kube-system --type=json -p='[
                {"op":"remove","path":"/spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/2"}
              ]' 2>/dev/null && echo "kube-proxy conflicting rule removed" || echo "kube-proxy already patched"

              # Patch ebs-csi-node: change NotIn[fargate,auto,hybrid] -> In[auto]
              kubectl patch daemonset ebs-csi-node -n kube-system --type=json -p='[
                {"op":"replace","path":"/spec/template/spec/affinity/nodeAffinity/requiredDuringSchedulingIgnoredDuringExecution/nodeSelectorTerms/0/matchExpressions/0","value":{"key":"eks.amazonaws.com/compute-type","operator":"In","values":["auto"]}}
              ]' && echo "ebs-csi-node affinity patched"
