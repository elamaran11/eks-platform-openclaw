{{- if .Values.kataNested.enabled }}
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: kata-nested
spec:
  amiFamily: AL2023
  # Stock EKS-optimized AL2023 AMI — Kata binaries/config are installed at
  # runtime by the kata-deploy DaemonSet, so no custom (Packer-baked) AMI.
  amiSelectorTerms:
    - alias: al2023@latest
  # Expose Intel VT-x into the guest so KVM can run nested VMs on 8i instances.
  # Requires Karpenter >= 1.13.0 (aws/karpenter-provider-aws#9043).
  cpuOptions:
    nestedVirtualization: enabled
  role: {{ .Values.nodeRole | quote }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 250Gi
        volumeType: gp3
        deleteOnTermination: true
        encrypted: true
  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
  # MIME-multipart userData: a boot shell script loads the KVM module (creates
  # /dev/kvm) BEFORE the node goes Ready, then the nodeadm NodeConfig joins the
  # cluster. cpuOptions above only makes VT-x visible; the guest OS must still
  # load kvm_intel — the stock AL2023 image does not auto-load it.
  # Containerd's kata runtime handler + RuntimeClass are configured later by the
  # kata-deploy DaemonSet (it owns containerd), so no containerd block here.
  userData: |
    MIME-Version: 1.0
    Content-Type: multipart/mixed; boundary="//"

    --//
    Content-Type: text/x-shellscript; charset="us-ascii"

    #!/bin/bash
    modprobe kvm_intel
    printf 'kvm\nkvm_intel\n' > /etc/modules-load.d/kvm.conf

    --//
    Content-Type: application/node.eks.aws

    apiVersion: node.eks.aws/v1alpha1
    kind: NodeConfig
    spec:
      cluster:
        name: {{ .Values.clusterName }}
    --//--
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: kata-nested
spec:
  template:
    metadata:
      labels:
        # katacontainers.io/kata-runtime MUST be set at node birth: kata-deploy's
        # kata-qemu/kata-clh RuntimeClass carries scheduling.nodeSelector for this
        # label, which the RuntimeClass admission controller force-merges into every
        # kata pod. Karpenter can only provision a node for those pods if the pool
        # advertises the label — without it, cold start deadlocks ("label does not
        # have known values"). Readiness is NOT gated on this label anymore;
        # kata-readiness watches the kata-deploy pod's /readyz instead.
        katacontainers.io/kata-runtime: "true"
        node-type: kata-nested
        kata-enabled: "true"
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: kata-nested
      taints:
        - key: kata
          value: "true"
          effect: NoSchedule
      # Removed by the kata-readiness DaemonSet once kata-deploy has labeled the
      # node katacontainers.io/kata-runtime=true. Karpenter ignores startupTaints
      # when deciding what to provision, but kubelet blocks workloads from binding
      # until it clears — so no kata-qemu pod lands before the runtime is ready.
      startupTaints:
        - key: katacontainers.io/runtime-not-ready
          effect: NoSchedule
      requirements:
        # Family + vCPU floor instead of an explicit size list: Karpenter is free to
        # pick any sufficiently large size in these validated (nested-virt-capable)
        # families, which widens the spot pool. The floor leaves headroom for VM overhead.
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
{{ toYaml .Values.kataNested.instanceFamilies | indent 12 }}
        - key: karpenter.k8s.aws/instance-cpu
          operator: Gt
          values: [{{ .Values.kataNested.minVcpu | quote }}]
        - key: karpenter.sh/capacity-type
          operator: In
          values:
{{ toYaml .Values.kataNested.capacityTypes | indent 12 }}
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
      expireAfter: 720h
  # Higher weight than kata-metal → Karpenter prefers nested when both can
  # satisfy a pod; metal is the fallback only when nested capacity is unavailable.
  weight: 20
  limits:
    cpu: {{ .Values.kataNested.cpuLimit }}
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: {{ .Values.kataNested.consolidateAfter }}
{{- end }}
{{- if .Values.kataMetal.enabled }}
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: kata-metal
spec:
  amiFamily: AL2023
  # Stock AL2023 AMI; kata-deploy installs Kata at runtime. Bare-metal has
  # native VT-x so no cpuOptions needed, but the KVM module still must be loaded.
  amiSelectorTerms:
    - alias: al2023@latest
  role: {{ .Values.nodeRole | quote }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 250Gi
        volumeType: gp3
        deleteOnTermination: true
        encrypted: true
  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
  userData: |
    MIME-Version: 1.0
    Content-Type: multipart/mixed; boundary="//"

    --//
    Content-Type: text/x-shellscript; charset="us-ascii"

    #!/bin/bash
    modprobe kvm_intel
    printf 'kvm\nkvm_intel\n' > /etc/modules-load.d/kvm.conf

    --//
    Content-Type: application/node.eks.aws

    apiVersion: node.eks.aws/v1alpha1
    kind: NodeConfig
    spec:
      cluster:
        name: {{ .Values.clusterName }}
    --//--
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: kata-metal
spec:
  template:
    metadata:
      labels:
        # katacontainers.io/kata-runtime set at boot — see kata-nested above
        # (RuntimeClass scheduling.nodeSelector requires it for provisioning).
        katacontainers.io/kata-runtime: "true"
        node-type: kata-metal
        kata-enabled: "true"
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: kata-metal
      taints:
        - key: kata
          value: "true"
          effect: NoSchedule
      # Removed by the kata-readiness DaemonSet once kata-deploy has labeled the
      # node katacontainers.io/kata-runtime=true (see kata-nested above).
      startupTaints:
        - key: katacontainers.io/runtime-not-ready
          effect: NoSchedule
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
{{ toYaml .Values.kataMetal.instanceTypes | indent 12 }}
        - key: karpenter.sh/capacity-type
          operator: In
          values:
{{ toYaml .Values.kataMetal.capacityTypes | indent 12 }}
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
      expireAfter: 720h
  # Lower weight than kata-nested → only chosen when nested capacity is unavailable.
  weight: 10
  limits:
    cpu: {{ .Values.kataMetal.cpuLimit }}
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: {{ .Values.kataMetal.consolidateAfter }}
{{- end }}
{{- if .Values.kataFc.enabled }}
---
# =============================================================================
# kata-fc: Firecracker VMM, running ALONGSIDE the kata-qemu pools.
#
# Same NO-BAKE model as kata-nested: stock al2023@latest AMI, and the kata
# runtime (fc shim, configuration-fc.toml, the kata-fc containerd runtime
# handler + RuntimeClass) is installed at boot by a dedicated kata-deploy-fc
# DaemonSet release — NOT baked into the AMI. See gitops/apps/kata-deploy-fc.yaml.
#
# The one thing kata-deploy can NOT do (its own chart note: "snapshotter:
# devmapper requires pre-configuration on the user side") is stand up the
# block snapshotter Firecracker needs — it cannot use virtio-fs/overlayfs.
# So this userData does ONLY the host-prep kata-deploy leaves to us:
#   1. modprobe kvm_intel        -> /dev/kvm (same as the qemu pools)
#   2. a devmapper thin-pool     -> the block device kata-fc images unpack onto
#   3. containerd's devmapper SNAPSHOTTER plugin (NOT the kata-fc runtime block —
#      kata-deploy-fc registers that itself once it lands and patches containerd)
# =============================================================================
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: kata-fc
spec:
  amiFamily: AL2023
  # Stock EKS-optimized AL2023 AMI — Kata fc binaries/config are installed at
  # runtime by the kata-deploy-fc DaemonSet, so no custom (Packer-baked) AMI.
  amiSelectorTerms:
    - alias: al2023@latest
  # Expose Intel VT-x into the guest so KVM can run the Firecracker VMM nested
  # on 8i instances. Requires Karpenter >= 1.13.0 (aws/karpenter-provider-aws#9043).
  cpuOptions:
    nestedVirtualization: enabled
  role: {{ .Values.nodeRole | quote }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.clusterName | quote }}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 250Gi
        volumeType: gp3
        deleteOnTermination: true
        encrypted: true
  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
  # MIME-multipart userData: a boot shell script loads KVM + builds the devmapper
  # thin-pool BEFORE the node goes Ready, then the nodeadm NodeConfig wires the
  # containerd devmapper snapshotter and joins the cluster. The kata-fc runtime
  # handler itself is added later by kata-deploy-fc (it owns containerd), so there
  # is deliberately NO runtimes.kata-fc block here.
  userData: |
    MIME-Version: 1.0
    Content-Type: multipart/mixed; boundary="//"

    --//
    Content-Type: text/x-shellscript; charset="us-ascii"

    #!/bin/bash
    set -euxo pipefail
    exec >/var/log/kata-fc-userdata.log 2>&1

    # 1. Nested KVM: cpuOptions makes VT-x visible; the guest must still load the
    #    module to create /dev/kvm. Persist it across reboots like the qemu pools.
    modprobe kvm_intel
    printf 'kvm\nkvm_intel\n' > /etc/modules-load.d/kvm.conf

    # 2. Firecracker needs a BLOCK snapshotter (no overlayfs). Build a loop-backed
    #    devmapper thin-pool named "devpool" that containerd's devmapper snapshotter
    #    (configured below) attaches to. Idempotent; ephemeral per node lifecycle.
    modprobe dm_thin_pool
    printf 'dm_thin_pool\n' > /etc/modules-load.d/devmapper.conf
    dnf install -y device-mapper-persistent-data || true

    DATA_DIR=/var/lib/containerd/devmapper
    mkdir -p "${DATA_DIR}"
    DATA_FILE="${DATA_DIR}/data"; META_FILE="${DATA_DIR}/meta"
    if ! dmsetup info devpool >/dev/null 2>&1; then
      [ -f "${DATA_FILE}" ] || { touch "${DATA_FILE}" && truncate -s 100G "${DATA_FILE}"; }
      [ -f "${META_FILE}" ] || { touch "${META_FILE}" && truncate -s 10G  "${META_FILE}"; }
      DATA_DEV=$(losetup --find --show "${DATA_FILE}")
      META_DEV=$(losetup --find --show "${META_FILE}")
      LENGTH_SECTORS=$(( $(blockdev --getsize64 -q "${DATA_DEV}") / 512 ))
      dmsetup create devpool \
        --table "0 ${LENGTH_SECTORS} thin-pool ${META_DEV} ${DATA_DEV} 128 32768"
    fi

    --//
    Content-Type: application/node.eks.aws

    apiVersion: node.eks.aws/v1alpha1
    kind: NodeConfig
    spec:
      cluster:
        name: {{ .Values.clusterName }}
      containerd:
        # Only the devmapper SNAPSHOTTER plugin — kata-deploy-fc adds the
        # runtimes.kata-fc handler (with snapshotter = devmapper) when it patches
        # containerd, via its SNAPSHOTTER_HANDLER_MAPPING=kata-fc:devmapper.
        config: |
          [plugins."io.containerd.grpc.v1.cri".containerd]
            discard_unpacked_layers = false
          [plugins."io.containerd.snapshotter.v1.devmapper"]
            pool_name = "devpool"
            root_path = "/var/lib/containerd/devmapper"
            base_image_size = "10GB"
            discard_blocks = true
    --//--
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: kata-fc
spec:
  template:
    metadata:
      labels:
        # Set at node birth so the kata-fc RuntimeClass admission controller can
        # schedule (it force-merges this label onto every kata-fc pod). Same
        # cold-start reasoning as katacontainers.io/kata-runtime on the qemu pools.
        katacontainers.io/kata-runtime-fc: "true"
        node-type: kata-fc
        # Static label kata-deploy-fc + its readiness DaemonSet select on (present
        # from boot — the kata-runtime-fc label is the post-install signal, not this).
        kata-fc-enabled: "true"
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: kata-fc
      taints:
        - key: kata-fc
          value: "true"
          effect: NoSchedule
      # Removed by the kata-fc readiness DaemonSet once kata-deploy-fc reports its
      # /readyz Ready on this node, so no kata-fc workload binds before the fc
      # runtime is installed. Karpenter ignores startupTaints when provisioning.
      startupTaints:
        - key: katacontainers.io/runtime-not-ready
          effect: NoSchedule
      requirements:
        # Family + vCPU floor instead of an explicit size list: Karpenter is free to
        # pick any sufficiently large size in these validated (nested-virt-capable)
        # families, which widens the spot pool. The floor leaves headroom for VM overhead.
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
{{ toYaml .Values.kataFc.instanceFamilies | indent 12 }}
        - key: karpenter.k8s.aws/instance-cpu
          operator: Gt
          values: [{{ .Values.kataFc.minVcpu | quote }}]
        - key: karpenter.sh/capacity-type
          operator: In
          values:
{{ toYaml .Values.kataFc.capacityTypes | indent 12 }}
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
      expireAfter: 720h
  limits:
    cpu: {{ .Values.kataFc.cpuLimit }}
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: {{ .Values.kataFc.consolidateAfter }}
{{- end }}
