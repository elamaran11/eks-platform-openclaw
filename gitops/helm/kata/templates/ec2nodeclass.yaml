apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: kata-bare-metal
spec:
  role: {{ .Values.nodeClass.role | quote }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.nodeClass.clusterName | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.nodeClass.clusterName | quote }}
  amiSelectorTerms:
    - name: "amazon-eks-node-al2023-x86_64-standard-1.32-v20260409"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 200Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        deleteOnTermination: true
