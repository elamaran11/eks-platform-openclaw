# Dedicated kata-qemu RuntimeClass (the default VMM), owned here rather than
# auto-generated by kata-deploy — symmetric with runtimeclass-fc.yaml. kata-deploy
# runs with runtimeClasses.enabled=false so this is the single source of truth.
#
# handler "kata-qemu" matches the containerd runtime kata-deploy registers when it
# installs the qemu shim. scheduling steers pods onto the kata-qemu pools (nested +
# metal): the admission controller force-merges this nodeSelector onto every
# kata-qemu pod, and the label is set at node birth by the NodePool template.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-qemu
handler: kata-qemu
scheduling:
  nodeSelector:
    katacontainers.io/kata-runtime: "true"
  tolerations:
    - key: kata
      value: "true"
      operator: Equal
      effect: NoSchedule
