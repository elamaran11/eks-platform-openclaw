apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: kata-bare-metal
spec:
  template:
    metadata:
      labels:
        katacontainers.io/kata-runtime: "true"
        eks.amazonaws.com/compute-type: "auto"
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: kata-bare-metal
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            {{- range .Values.instanceTypes }}
            - {{ . }}
            {{- end }}
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: eks.amazonaws.com/compute-type
          operator: In
          values: ["auto"]
      taints:
        - key: kata
          value: "true"
          effect: NoSchedule
  limits:
    cpu: {{ .Values.nodePool.cpuLimit | quote }}
    memory: {{ .Values.nodePool.memoryLimit | quote }}
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: {{ .Values.nodePool.consolidateAfter }}
