# Dedicated kata-fc (Firecracker) RuntimeClass, owned here — symmetric with
# runtimeclass-qemu.yaml / runtimeclass-clh.yaml. kata-deploy runs with
# runtimeClasses.enabled=false, so the kata chart is the single source of truth.
# handler "kata-fc" matches the containerd runtime the kata-deploy-fc release
# registers when it installs the fc shim. scheduling steers pods onto the kata-fc
# nodepool (label + taint) so workloads only set runtimeClassName.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-fc
handler: kata-fc
scheduling:
  nodeSelector:
    katacontainers.io/kata-runtime-fc: "true"
  tolerations:
    - key: kata-fc
      value: "true"
      operator: Equal
      effect: NoSchedule
