# Firecracker RuntimeClass, defined here (not by kata-deploy, which only enables
# the qemu + clh shims). The handler "kata-fc" matches the containerd runtime
# registered in the kata-fc EC2NodeClass userData. scheduling steers pods onto
# the kata-fc nodepool (label + taint) so workloads only set runtimeClassName.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-fc
handler: kata-fc
scheduling:
  nodeSelector:
    katacontainers.io/kata-runtime-fc: "true"
  tolerations:
    - key: kata-fc
      value: "true"
      operator: Equal
      effect: NoSchedule
