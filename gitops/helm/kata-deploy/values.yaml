kata-deploy:
  image:
    reference: quay.io/kata-containers/kata-deploy
    tag: "3.32.0"
  # Target kata nodes by the STATIC label set in the Karpenter NodePool template.
  # Do NOT use katacontainers.io/kata-runtime here — kata-deploy *emits* that label
  # only after install completes, so selecting on it would deadlock (never schedules
  # -> never installs -> never labels).
  nodeSelector:
    kata-enabled: "true"
  tolerations:
    # Workload taint — only kata pods run on these nodes.
    - key: kata
      operator: Equal
      value: "true"
      effect: NoSchedule
    # Startup taint — kata-deploy must run *despite* it (it's what clears the node
    # for workloads once install finishes). The kata-readiness DaemonSet removes it.
    - key: katacontainers.io/runtime-not-ready
      operator: Exists
      effect: NoSchedule
  shims:
    disableAll: true
    qemu:
      enabled: true
    clh:
      enabled: true
