kata-deploy:
  image:
    reference: public.ecr.aws/t6v6o5d5/kube-prometheus
    tag: kata-deploy-3.27.0
  nodeSelector:
    katacontainers.io/kata-runtime: "true"
  tolerations:
    - key: kata
      operator: Equal
      value: "true"
      effect: NoSchedule
  shims:
    disableAll: true
    qemu:
      enabled: true
    clh:
      enabled: true
