# Patch to add hostNetwork: true + ClusterFirstWithHostNet DNS to kata-deploy DaemonSet.
# The upstream chart doesn't expose these as values keys.
# kata-deploy needs hostNetwork to reach the kubelet, and ClusterFirstWithHostNet
# so that kubernetes.default.svc resolves correctly when hostNetwork is enabled.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kata-deploy
  namespace: kube-system
spec:
  template:
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
