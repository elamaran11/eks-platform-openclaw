apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kata-kubelet-restart
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: kata-kubelet-restart
  template:
    metadata:
      labels:
        app: kata-kubelet-restart
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      # Only recover nodes where kata-deploy ran and bounced containerd.
      # Baked-AMI nodes (kata-path=baked-ami) already have Kata installed at
      # image bake time and do NOT need — and must NOT receive — a kubelet
      # restart, which would brick them.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: katacontainers.io/kata-runtime
                    operator: In
                    values: ["true"]
                  - key: kata-path
                    operator: NotIn
                    values: ["baked-ami"]
      initContainers:
        - name: restart-kubelet
          image: nicolaka/netshoot
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              echo "Restarting kubelet to reconnect CRI after kata-deploy containerd restart..."
              nsenter -t 1 -m -u -i -n -p -- systemctl restart kubelet
              echo "Kubelet restarted, waiting 30s for it to stabilize..."
              sleep 30
              echo "Done"
      containers:
        - name: sleep
          image: nicolaka/netshoot
          command: ["sh", "-c", "sleep infinity"]
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
