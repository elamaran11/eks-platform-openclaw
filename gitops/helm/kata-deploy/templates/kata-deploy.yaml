apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kata-deploy
  namespace: kube-system
  labels:
    name: kata-deploy
spec:
  selector:
    matchLabels:
      name: kata-deploy
  template:
    metadata:
      labels:
        name: kata-deploy
    spec:
      serviceAccountName: kata-deploy
      hostPID: true
      hostNetwork: true
      tolerations:
        - key: kata
          operator: Equal
          value: "true"
          effect: NoSchedule
        - operator: Exists
      nodeSelector:
        katacontainers.io/kata-runtime: "true"
      priorityClassName: system-node-critical
      initContainers:
        - name: kata-deploy
          image: quay.io/kata-containers/kata-deploy:stable
          command:
            - bash
            - -c
            - /opt/kata-artifacts/scripts/kata-deploy.sh install
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SHIMS
              value: qemu
            - name: DEFAULT_SHIM
              value: qemu
            - name: CREATE_RUNTIMECLASSES
              value: "false"
            - name: CREATE_DEFAULT_RUNTIMECLASS
              value: "false"
          volumeMounts:
            - name: containerd-conf
              mountPath: /etc/containerd/
            - name: kata-artifacts
              mountPath: /opt/kata/
            - name: dbus
              mountPath: /var/run/dbus
            - name: systemd
              mountPath: /run/systemd
            - name: local-log
              mountPath: /var/log/
            - name: os-release
              mountPath: /etc/os-release
          securityContext:
            privileged: true
      containers:
        - name: kata-deploy
          image: quay.io/kata-containers/kata-deploy:stable
          command:
            - bash
            - -c
            - /opt/kata-artifacts/scripts/kata-deploy.sh wait-and-cleanup
          lifecycle:
            preStop:
              exec:
                command:
                  - bash
                  - -c
                  - /opt/kata-artifacts/scripts/kata-deploy.sh cleanup
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SHIMS
              value: qemu
            - name: DEFAULT_SHIM
              value: qemu
            - name: CREATE_RUNTIMECLASSES
              value: "false"
            - name: CREATE_DEFAULT_RUNTIMECLASS
              value: "false"
          volumeMounts:
            - name: containerd-conf
              mountPath: /etc/containerd/
            - name: kata-artifacts
              mountPath: /opt/kata/
            - name: dbus
              mountPath: /var/run/dbus
            - name: systemd
              mountPath: /run/systemd
            - name: local-log
              mountPath: /var/log/
            - name: os-release
              mountPath: /etc/os-release
          securityContext:
            privileged: true
      volumes:
        - name: containerd-conf
          hostPath:
            path: /etc/containerd/
        - name: kata-artifacts
          hostPath:
            path: /opt/kata/
            type: DirectoryOrCreate
        - name: dbus
          hostPath:
            path: /var/run/dbus
        - name: systemd
          hostPath:
            path: /run/systemd
        - name: local-log
          hostPath:
            path: /var/log/
        - name: os-release
          hostPath:
            path: /etc/os-release
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kata-deploy
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kata-deploy
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kata-deploy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kata-deploy
subjects:
  - kind: ServiceAccount
    name: kata-deploy
    namespace: kube-system
