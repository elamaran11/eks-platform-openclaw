---
# WHY THIS DAEMONSET EXISTS (taint removal):
# kata-deploy does NOT natively remove a node taint when its install finishes —
# there is no startup-taint / taint-removal option in the kata-deploy chart
# values or templates. It only *emits* the katacontainers.io/kata-runtime label
# as its final install step. Upstream tracks adding native readiness/taint
# handling here: https://github.com/kata-containers/kata-containers/issues/13283
#
# Until that lands, this DaemonSet is the glue: it watches for kata-deploy's
# post-install label and removes the katacontainers.io/runtime-not-ready startup
# taint, which is what actually lets kata-qemu workloads bind to the node. If/when
# kata-deploy gains built-in taint removal, this DaemonSet can be retired.

# kata-readiness — gates kata nodes until the runtime is actually usable.
#
# Karpenter brings kata nodes up carrying a startup taint (katacontainers.io/runtime-not-ready).
# kubelet will not bind workloads while it is present, but Karpenter ignores it when
# provisioning, so there is no chicken-and-egg. This DaemonSet:
#   1. lands early (it tolerates the startup taint, selects the STATIC kata-enabled label)
#   2. waits until kata-deploy finishes — signalled by the katacontainers.io/kata-runtime
#      label, which kata-deploy applies only AFTER patching + restarting containerd
#   3. removes the startup taint, letting kata-qemu workloads bind to a ready node
#
# NOTE: we deliberately do NOT restart kubelet here. kubelet's CRI client reconnects
# to containerd automatically after kata-deploy's restart, so the bounce should be
# unnecessary. The parked _kata-kubelet-restart.yaml.disabled has the old logic if a
# real deploy shows kubelet failing to re-probe the kata runtime.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kata-readiness
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kata-readiness
rules:
  # get/list to poll the readiness label; patch to remove the startup taint.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kata-readiness
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kata-readiness
subjects:
  - kind: ServiceAccount
    name: kata-readiness
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kata-readiness
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: kata-readiness
  template:
    metadata:
      labels:
        app: kata-readiness
    spec:
      serviceAccountName: kata-readiness
      # No hostPID / hostNetwork / privileged needed — this pod only talks to the
      # API server (poll label, remove taint). That also lets us use a plain kubectl
      # image instead of a privileged nsenter-capable one.
      #
      # Tolerate everything (Exists) so we land on the node *before* the runtime is
      # ready — covers both the kata workload taint and the katacontainers.io/runtime-not-ready
      # startup taint we are responsible for removing.
      tolerations:
        - operator: Exists
      # STATIC label set at NodePool creation — present from boot, so this pod schedules
      # immediately. (Do NOT use katacontainers.io/kata-runtime: that appears only after
      # kata-deploy finishes, which would be too late to clear the startup taint.)
      nodeSelector:
        kata-enabled: "true"
      containers:
        - name: kata-readiness
          # Verify this image is pullable in your environment (registry egress).
          # Alternatives if bitnami is unavailable: rancher/kubectl, alpine/k8s.
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "[kata-readiness] node=${NODE_NAME}: waiting for kata-deploy to finish..."
              # kata-deploy applies this label as its final install step (after the
              # containerd restart), so its presence means the runtime is configured.
              until [ "$(kubectl get node "${NODE_NAME}" \
                  -o jsonpath='{.metadata.labels.katacontainers\.io/kata-runtime}')" = "true" ]; do
                sleep 5
              done
              echo "[kata-readiness] kata-deploy done; removing startup taint katacontainers.io/runtime-not-ready..."
              kubectl taint node "${NODE_NAME}" katacontainers.io/runtime-not-ready:NoSchedule- || true
              echo "[kata-readiness] node ${NODE_NAME} is ready for kata workloads."
              sleep infinity
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
