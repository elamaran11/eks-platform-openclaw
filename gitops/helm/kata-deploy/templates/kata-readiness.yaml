---
# kata-readiness — gates kata nodes until the runtime is actually usable.
#
# Karpenter brings kata nodes up carrying a startup taint (kata.io/runtime-not-ready).
# kubelet will not bind workloads while it is present, but Karpenter ignores it when
# provisioning, so there is no chicken-and-egg. This DaemonSet:
#   1. lands early (it tolerates the startup taint, selects the STATIC kata-enabled label)
#   2. waits until kata-deploy finishes — signalled by the katacontainers.io/kata-runtime
#      label, which kata-deploy applies only AFTER patching + restarting containerd
#   3. restarts kubelet so it reconnects the CRI after that containerd restart
#   4. removes the startup taint, letting kata-qemu workloads bind to a ready node
#
# This replaces the old unsequenced "kata-kubelet-restart" DaemonSet, which raced
# kata-deploy with no ordering guarantee.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kata-readiness
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kata-readiness
rules:
  # get/list to poll the readiness label; patch to remove the startup taint.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kata-readiness
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kata-readiness
subjects:
  - kind: ServiceAccount
    name: kata-readiness
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kata-readiness
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: kata-readiness
  template:
    metadata:
      labels:
        app: kata-readiness
    spec:
      serviceAccountName: kata-readiness
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Tolerate everything (Exists) so we land on the node *before* the runtime is
      # ready — this covers both the kata workload taint and the kata.io/runtime-not-ready
      # startup taint we are responsible for removing.
      tolerations:
        - operator: Exists
      # STATIC label set at NodePool creation — present from boot, so this pod schedules
      # immediately. (Do NOT use katacontainers.io/kata-runtime: that appears only after
      # kata-deploy finishes, which would be too late to clear the startup taint.)
      nodeSelector:
        kata-enabled: "true"
      containers:
        - name: kata-readiness
          # nicolaka/netshoot bundles both kubectl and nsenter (verify on first deploy).
          image: nicolaka/netshoot
          securityContext:
            privileged: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - sh
            - -c
            - |
              set -eu
              echo "[kata-readiness] node=${NODE_NAME}: waiting for kata-deploy to finish..."
              # kata-deploy applies this label as its final install step (after the
              # containerd restart), so its presence means the runtime is configured.
              until [ "$(kubectl get node "${NODE_NAME}" \
                  -o jsonpath='{.metadata.labels.katacontainers\.io/kata-runtime}')" = "true" ]; do
                sleep 5
              done
              echo "[kata-readiness] kata-deploy done; restarting kubelet to reconnect CRI..."
              nsenter -t 1 -m -u -i -n -p -- systemctl restart kubelet
              echo "[kata-readiness] waiting 30s for kubelet to stabilize..."
              sleep 30
              echo "[kata-readiness] removing startup taint kata.io/runtime-not-ready..."
              kubectl taint node "${NODE_NAME}" kata.io/runtime-not-ready:NoSchedule- || true
              echo "[kata-readiness] node ${NODE_NAME} is ready for kata workloads."
              sleep infinity
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
