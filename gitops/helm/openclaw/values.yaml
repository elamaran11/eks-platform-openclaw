openclaw-operator:
  # image omitted on purpose — the 0.36 chart defaults to the correct
  # ghcr.io/paperclipinc/openclaw-operator image at the chart appVersion.
  # (The old value pointed at a kube-prometheus image, a stale copy-paste.)

  # Pin the operator to the managed system nodegroup (labeled role=system,
  # same target as Karpenter/ArgoCD). The toleration mirrors the Karpenter
  # app; the system MNG is only labeled (not tainted), so it's a harmless
  # consistency measure.
  nodeSelector:
    role: system
  tolerations:
    - key: role
      operator: Equal
      value: system
      effect: NoSchedule

# NOTE: litellm endpoint + kata sandbox runtimeClass/tolerations were values
# on the old 0.22 chart. In 0.36 the operator chart only deploys the operator
# itself; per-agent config (litellm endpoint, runtimeClassName: kata-qemu,
# kata tolerations) now lives on an OpenClawInstance CRD applied separately.
# Track that as a follow-up once the operator is healthy.
