litellm-helm:
  # Inject guardrail ID/version and AWS region from litellm-secrets K8s secret
  # LiteLLM supports os.environ/VAR_NAME substitution in model config
  extraEnvVars:
    - name: BEDROCK_GUARDRAIL_ID
      valueFrom:
        secretKeyRef:
          name: litellm-secrets
          key: bedrock_guardrail_id
    - name: BEDROCK_GUARDRAIL_VERSION
      valueFrom:
        secretKeyRef:
          name: litellm-secrets
          key: bedrock_guardrail_version
    - name: AWS_REGION
      valueFrom:
        secretKeyRef:
          name: litellm-secrets
          key: aws_region
    - name: LITELLM_API_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-secrets
          key: api_key

  proxy_config:
    model_list:
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-6
          aws_region_name: "os.environ/AWS_REGION"
          drop_params: true

      - model_name: claude-opus-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-20250514-v1:0
          aws_region_name: "os.environ/AWS_REGION"
          drop_params: true

      - model_name: claude-haiku-4-5
        litellm_params:
          model: bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0
          aws_region_name: "os.environ/AWS_REGION"
          drop_params: true

    general_settings:
      default_model: claude-sonnet-4-6
      store_model_in_db: false
      master_key: "os.environ/PROXY_MASTER_KEY"

    environment_variables:
      OPENCLAW_API_KEY: "os.environ/LITELLM_API_KEY"

    router_settings:
      allowed_fails: 3

    key_management_settings:
      store_virtual_keys: true

    keys:
      - key: "os.environ/LITELLM_API_KEY"
        models:
          - claude-sonnet-4-6
          - claude-opus-4-6
          - claude-haiku-4-5

    litellm_settings:
      drop_params: true
      additional_drop_params:
        - store
        - logprobs
        - top_logprobs
      success_callback: ["prometheus"]
      failure_callback: ["prometheus"]
      prometheus_url: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"

  db_url: "postgresql://litellm:NoTaGrEaTpAsSwOrD@litellm-postgresql:5432/litellm"

  postgresql:
    enabled: true
    primary:
      persistence:
        storageClass: ebs-gp3
      resources:
        limits:
          memory: 512Mi
        requests:
          memory: 256Mi

  migrations:
    enabled: false

  serviceAccount:
    create: true
    name: litellm
