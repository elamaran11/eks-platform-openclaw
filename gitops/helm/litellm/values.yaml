litellm-helm:
  # Inject guardrail ID/version and AWS region from litellm-secrets K8s secret
  # LiteLLM supports os.environ/VAR_NAME substitution in model config
  extraEnvVars:
    - name: BEDROCK_GUARDRAIL_ID
      valueFrom:
        secretKeyRef:
          name: litellm-secrets
          key: bedrock_guardrail_id
    - name: BEDROCK_GUARDRAIL_VERSION
      valueFrom:
        secretKeyRef:
          name: litellm-secrets
          key: bedrock_guardrail_version
    - name: AWS_REGION
      valueFrom:
        secretKeyRef:
          name: litellm-secrets
          key: aws_region
    - name: DATABASE_URL
      value: "postgresql://litellm:NoTaGrEaTpAsSwOrD@litellm-postgresql:5432/litellm"

  proxy_config:
    model_list:
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-6
          aws_region_name: "os.environ/AWS_REGION"
          guardrailConfig:
            guardrailIdentifier: "os.environ/BEDROCK_GUARDRAIL_ID"
            guardrailVersion: "os.environ/BEDROCK_GUARDRAIL_VERSION"
            trace: ENABLED

      - model_name: claude-opus-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-20250514-v1:0
          aws_region_name: "os.environ/AWS_REGION"
          guardrailConfig:
            guardrailIdentifier: "os.environ/BEDROCK_GUARDRAIL_ID"
            guardrailVersion: "os.environ/BEDROCK_GUARDRAIL_VERSION"
            trace: ENABLED

      - model_name: claude-haiku-4-5
        litellm_params:
          model: bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0
          aws_region_name: "os.environ/AWS_REGION"
          guardrailConfig:
            guardrailIdentifier: "os.environ/BEDROCK_GUARDRAIL_ID"
            guardrailVersion: "os.environ/BEDROCK_GUARDRAIL_VERSION"
            trace: ENABLED

    general_settings:
      default_model: claude-sonnet-4-6
      store_model_in_db: false

    litellm_settings:
      success_callback: ["prometheus"]
      failure_callback: ["prometheus"]
      prometheus_url: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"

  db_url: "postgresql://litellm:NoTaGrEaTpAsSwOrD@litellm-postgresql:5432/litellm"

  postgresql:
    enabled: false
    primary:
      persistence:
        storageClass: ebs-gp3

  migrations:
    enabled: false

  serviceAccount:
    create: true
    name: litellm
