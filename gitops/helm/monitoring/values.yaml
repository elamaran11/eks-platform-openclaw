kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: ebs-gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: 2000m
          memory: 4Gi

  grafana:
    adminPassword: admin
    persistence:
      enabled: true
      storageClassName: ebs-gp3
      size: 10Gi
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
        label: grafana_dashboard

  alertmanager:
    enabled: true
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: ebs-gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: "null"
        routes:
          - matchers:
              - alertname =~ "Watchdog|InfoInhibitor"
            receiver: "null"
      receivers:
        - name: "null"

  nodeExporter:
    enabled: true

  kubeStateMetrics:
    enabled: true

  additionalServiceMonitors:
    - name: litellm
      selector:
        matchLabels:
          app.kubernetes.io/name: litellm
      namespaceSelector:
        matchNames:
          - litellm
      endpoints:
        - port: http
          path: /metrics
          interval: 30s