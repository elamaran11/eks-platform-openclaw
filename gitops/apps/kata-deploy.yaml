apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kata-deploy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/elamaran11/eks-platform-openclaw
    targetRevision: feat/kata-nested-8i-kata-deploy
    path: gitops/helm/kata-deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  ignoreDifferences:
    - group: node.k8s.io
      kind: RuntimeClass
      name: kata-qemu
    - group: ""
      kind: ServiceAccount
      name: kata-deploy
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: kata-deploy
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: kata-deploy
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
