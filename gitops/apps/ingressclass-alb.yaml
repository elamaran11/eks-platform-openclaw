apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  # Self-managed AWS Load Balancer Controller (not EKS Auto Mode's
  # bundled controller, which uses eks.amazonaws.com/alb).
  controller: ingress.k8s.aws/alb
