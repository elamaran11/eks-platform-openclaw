apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/elamaran11/eks-platform-openclaw
    targetRevision: feat/kata-nested-8i-kata-deploy
    path: gitops/helm/litellm
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: litellm-masterkey
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: litellm-postgresql
      jsonPointers:
        - /data
    - group: apps
      kind: StatefulSet
      name: litellm-postgresql
      jsonPointers:
        - /spec/volumeClaimTemplates
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
