apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: slack-sandbox
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/elamaran11/eks-platform-openclaw
    targetRevision: feat/kata-nested-8i-kata-deploy
    path: examples/slack
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
