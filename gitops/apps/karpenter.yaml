apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    # 1.13.0+ required for EC2NodeClass spec.cpuOptions.nestedVirtualization (aws/karpenter-provider-aws#9043)
    targetRevision: "1.13.0"
    helm:
      releaseName: karpenter
      valuesObject:
        # Cluster name is ${project_name}-eks from Terraform; project_name default is "openclaw".
        settings:
          clusterName: openclaw-eks
          interruptionQueue: openclaw-eks-karpenter
        replicas: 2
        serviceAccount:
          name: karpenter
        tolerations:
          - key: role
            operator: Equal
            value: system
            effect: NoSchedule
        nodeSelector:
          role: system
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated: { prune: false, selfHeal: true }
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
