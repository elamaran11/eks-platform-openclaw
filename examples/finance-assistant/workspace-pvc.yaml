apiVersion: v1
kind: Namespace
metadata:
  name: finance-assistant
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
# Per-user workspace PVCs are provisioned on demand by the session-router
