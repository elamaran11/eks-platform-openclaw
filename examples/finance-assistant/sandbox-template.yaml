# Declarative sandbox provisioning (agent-sandbox v0.5.0, v1beta1).
#
# Replaces the imperative session-router flow (deep-clone a template
# ConfigMap + kubectl-create a per-user Sandbox/PVC/Service). Now:
#   - ONE SandboxTemplate describes the pod spec (identical for every pod,
#     which is what lets the warm pool pre-bind without a cold start).
#   - ONE SandboxWarmPool keeps a warm buffer of replicas.
#   - The session-router creates ONE SandboxClaim per user; the controller
#     binds it to a warm sandbox (fast) or cold-creates one (empty pool).
#
# Per-user isolation/persistence is handled INSIDE the pod by openclaw's
# dynamic multi-agent feature: the adapter runs `openclaw agents add
# pod-agent-<suffix> --workspace /workspace/users/<suffix>` on first use.
# Each user's files live in their own subdir on the shared EFS volume,
# which survives claim teardown. The pod spec stays byte-identical across
# all warm pods (required for warm-bind).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: finance-sandbox
  namespace: finance-assistant
---
# One shared RWX EFS volume, mounted at /workspace in every sandbox. Each
# user gets a /workspace/users/<suffix> subdir (created by the adapter).
# Lives OUTSIDE the claim/sandbox lifecycle, so user files survive when a
# claim is torn down for idleness. The access point / mount must be
# writable by uid 1000 so the adapter can mkdir the per-user subdir.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: finance-shared-efs
  namespace: finance-assistant
spec:
  accessModes: [ReadWriteMany]
  storageClassName: efs-workspaces
  resources:
    requests:
      storage: 10Gi
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: finance-sandbox
  namespace: finance-assistant
spec:
  # Controller creates a Service per bound sandbox; the router proxies to
  # its status.serviceFQDN. Replaces the old static finance-sandbox Service.
  service: true
  # We keep the hand-written networkpolicy.yaml (which scopes ingress to
  # the session-router). Do NOT let the controller manage a NetworkPolicy
  # that would scope ingress to the upstream sandbox-router we don't run.
  networkPolicyManagement: Unmanaged
  podTemplate:
    metadata:
      labels:
        app: finance-sandbox
    spec:
      runtimeClassName: kata-qemu
      serviceAccountName: finance-sandbox
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        # Pin to the kata-NESTED pool specifically (node-type is unique to it).
        node-type: kata-nested
      tolerations:
        - key: kata
          operator: Equal
          value: "true"
          effect: NoSchedule
      volumes:
        # Shared EFS instead of a per-user emptyDir/PVC. Per-user subdirs
        # under /workspace/users/<suffix> give each user durable state.
        - name: workspace
          persistentVolumeClaim:
            claimName: finance-shared-efs
        - name: system-prompt
          configMap:
            name: finance-system-prompt
        - name: openclaw-config
          emptyDir: {}
        - name: adapter-src
          configMap:
            name: finance-adapter-src
            defaultMode: 0555
        - name: adapter-tmp
          emptyDir: {}
        # Tmpfs-backed secret mounts with mode 0400. Keeps keys out of env
        # and out of etcd-disk node paths.
        - name: secrets
          projected:
            defaultMode: 0400
            sources:
              - secret:
                  name: finance-litellm-key
                  items:
                    - key: api-key
                      path: litellm-api-key
              - secret:
                  name: openclaw-gateway-auth
                  items:
                    - key: token
                      path: gateway-auth-token
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.5.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
          env:
            - name: WORKSPACE_DIR
              value: /workspace
            - name: SYSTEM_PROMPT_FILE
              value: /etc/openclaw/system-prompt.md
          command:
            - sh
            - -c
            - |
              set -eu
              # Secrets come from tmpfs files, not env vars — live in shell
              # locals only long enough to render openclaw.json.
              LITELLM_API_KEY=$(cat /var/run/openclaw/litellm-api-key)
              GATEWAY_AUTH_TOKEN=$(cat /var/run/openclaw/gateway-auth-token)
              # NOTE: no per-user /workspace scaffolding here. /workspace is
              # now a SHARED EFS root; per-user files live under
              # /workspace/users/<suffix>, created by the adapter when it
              # provisions that user's openclaw agent. The gateway's default
              # agent workspace stays /workspace but is unused for user data.
              mkdir -p /home/node/.openclaw
              # Render openclaw.json with json.dump so the system prompt and
              # secrets are always correctly escaped (never string-substituted).
              # Spread across lines for readability; the output is unchanged.
              LITELLM_API_KEY="${LITELLM_API_KEY}" GATEWAY_AUTH_TOKEN="${GATEWAY_AUTH_TOKEN}" python3 -c '
              import json, os

              prompt = open("/etc/openclaw/system-prompt.md").read()

              cfg = {
                  "models": {
                      "providers": {
                          "litellm": {
                              "baseUrl": "http://litellm.litellm.svc.cluster.local:4000",
                              "apiKey": os.environ["LITELLM_API_KEY"],
                              "api": "openai-completions",
                              "models": [
                                  {
                                      "id": "claude-opus-4-6",
                                      "name": "Claude Opus 4.6",
                                      "reasoning": True,
                                      "input": ["text", "image"],
                                      "contextWindow": 200000,
                                      "maxTokens": 4096,
                                  },
                                  {
                                      "id": "claude-haiku-4-5",
                                      "name": "Claude Haiku 4.5",
                                      "reasoning": True,
                                      "input": ["text", "image"],
                                      "contextWindow": 200000,
                                      "maxTokens": 3072,
                                  },
                              ],
                          }
                      }
                  },
                  "agents": {
                      "defaults": {
                          "model": {
                              "primary": "litellm/claude-opus-4-6",
                              "fallbacks": ["litellm/claude-haiku-4-5"],
                          },
                          "workspace": "/workspace",
                          "systemPromptOverride": prompt,
                          "skipBootstrap": True,
                          "thinkingDefault": "off",
                      }
                  },
                  "gateway": {
                      "port": 18789,
                      "mode": "local",
                      "bind": "lan",
                      "auth": {"mode": "token", "token": os.environ["GATEWAY_AUTH_TOKEN"]},
                      "controlUi": {"dangerouslyAllowHostHeaderOriginFallback": True},
                      "http": {"endpoints": {"chatCompletions": {"enabled": True}}},
                  },
              }

              json.dump(cfg, open("/home/node/.openclaw/openclaw.json", "w"), indent=2)
              '
              unset LITELLM_API_KEY GATEWAY_AUTH_TOKEN
              exec node dist/index.js gateway --bind=lan --port 18789 --allow-unconfigured
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          volumeMounts:
            - { name: workspace,       mountPath: /workspace }
            - { name: system-prompt,   mountPath: /etc/openclaw, readOnly: true }
            - { name: openclaw-config, mountPath: /home/node/.openclaw }
            - { name: secrets,         mountPath: /var/run/openclaw, readOnly: true }
          readinessProbe:
            tcpSocket: { port: 18789 }
            initialDelaySeconds: 10
          livenessProbe:
            tcpSocket: { port: 18789 }
            initialDelaySeconds: 30
        - name: adapter
          image: ghcr.io/openclaw/openclaw:2026.5.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities: { drop: [ALL] }
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          env:
            - name: PORT
              value: "18790"
            - name: SYSTEM_PROMPT_FILE
              value: /etc/openclaw/system-prompt.md
            - name: OPENCLAW_CMD
              value: openclaw
            - name: OPENCLAW_ARGS
              value: ""
            - name: HOME
              value: /tmp/adapter-home
          command:
            - sh
            - -c
            - |
              # Wait for the openclaw sidecar to write its config.
              for i in $(seq 1 60); do
                [ -f /home/node/.openclaw/openclaw.json ] && break
                sleep 1
              done
              mkdir -p "$HOME/.openclaw"
              # Reuse the openclaw sibling config so the adapter's `openclaw`
              # CLI talks to the same local gateway, auth, and models.
              cp /home/node/.openclaw/openclaw.json "$HOME/.openclaw/openclaw.json"
              exec node /adapter/server.js
          ports:
            - { name: adapter, containerPort: 18790, protocol: TCP }
          volumeMounts:
            - { name: workspace,       mountPath: /workspace }
            - { name: system-prompt,   mountPath: /etc/openclaw, readOnly: true }
            - { name: openclaw-config, mountPath: /home/node/.openclaw }
            - { name: adapter-src,     mountPath: /adapter, readOnly: true }
            - { name: adapter-tmp,     mountPath: /tmp/adapter-home }
            - { name: secrets,         mountPath: /var/run/openclaw, readOnly: true }
          readinessProbe:
            httpGet: { path: /healthz, port: 18790 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 18790 }
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxWarmPool
metadata:
  name: finance
  namespace: finance-assistant
spec:
  # One warm buffer. When a claim binds the warm sandbox, the pool
  # replenishes a fresh one. No KEDA/autoscaling.
  replicas: 1
  sandboxTemplateRef:
    name: finance-sandbox
