apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-ui
  namespace: finance-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finance-ui
  template:
    metadata:
      labels:
        app: finance-ui
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        runAsNonRoot: true
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          image: 940019131157.dkr.ecr.us-west-2.amazonaws.com/finance-ui:v0.4.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: USE_SESSION_ROUTER
              value: "false"
            - name: LEGACY_ADAPTER_URL
              value: http://finance-sandbox.finance-assistant.svc.cluster.local:18790
            - name: ROUTER_URL
              value: http://finance-session-router.finance-assistant.svc.cluster.local:18790
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities: { drop: [ALL] }
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - { name: cache, mountPath: /app/.next/cache }
            - { name: tmp,   mountPath: /tmp }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - { name: cache, emptyDir: {} }
        - { name: tmp,   emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: finance-ui
  namespace: finance-assistant
spec:
  selector:
    app: finance-ui
  ports:
    - port: 80
      targetPort: 3000
---
# Single Ingress, single ALB, split auth via annotation-based actions.
# /app, /api, /login, /oauth2/* go through authenticate-cognito → forward.
# Everything else (/, /_next/*, /favicon.ico, static assets) forwards
# directly to the UI pod without an auth check — so the landing page is
# public and indexable.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-ui
  namespace: finance-assistant
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:940019131157:certificate/2d6b2f41-9673-4c9e-a6ad-daa34982ced7
    # Action "authed-forward": Cognito auth, then forward to the UI
    # service. Used only for /app, /api, /login, /oauth2/* rules below.
    alb.ingress.kubernetes.io/actions.authed-forward: |
      {
        "type": "authenticate-cognito",
        "authenticateCognitoConfig": {
          "userPoolArn": "arn:aws:cognito-idp:us-west-2:940019131157:userpool/us-west-2_Gpb9hjoLH",
          "userPoolClientId": "3uelp9pbba5ijnph9ej03jclvi",
          "userPoolDomain": "openclaw-finance-940019131157",
          "scope": "openid email profile",
          "sessionCookieName": "AWSELBAuthSessionCookie",
          "sessionTimeout": 3600,
          "onUnauthenticatedRequest": "authenticate"
        },
        "forwardConfig": {
          "targetGroups": [
            {
              "serviceName": "finance-ui",
              "servicePort": "80"
            }
          ]
        }
      }
    external-dns.alpha.kubernetes.io/hostname: finassist.elamaras.people.aws.dev
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
spec:
  ingressClassName: alb
  rules:
    - host: finassist.elamaras.people.aws.dev
      http:
        paths:
          # Protected paths — must come first so they match before the
          # catch-all / below. Backend "authed-forward" is a synthetic
          # service name the ALB controller recognizes from the
          # actions.authed-forward annotation.
          - path: /app
            pathType: Prefix
            backend:
              service:
                name: authed-forward
                port:
                  name: use-annotation
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: authed-forward
                port:
                  name: use-annotation
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: authed-forward
                port:
                  name: use-annotation
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: authed-forward
                port:
                  name: use-annotation
          # Public catch-all — landing page, static assets, favicon.
          # Matches anything not caught by the four protected rules.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finance-ui
                port:
                  number: 80
