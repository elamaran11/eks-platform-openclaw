apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-ui
  namespace: finance-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finance-ui
  template:
    metadata:
      labels:
        app: finance-ui
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        runAsNonRoot: true
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          # Next.js 15 app. Replaced via scripts/render-finance-ui.sh
          image: 940019131157.dkr.ecr.us-west-2.amazonaws.com/finance-ui:v0.4.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            # Phase-5 cutover flag: set to "true" to route chats through
            # the session-router (per-user Sandbox). Defaults to the legacy
            # shared sandbox. Flip with a deployment patch — no image rebuild.
            - name: USE_SESSION_ROUTER
              value: "false"
            - name: LEGACY_ADAPTER_URL
              value: http://finance-sandbox.finance-assistant.svc.cluster.local:18790
            - name: ROUTER_URL
              value: http://finance-session-router.finance-assistant.svc.cluster.local:18790
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities: { drop: [ALL] }
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - { name: cache, mountPath: /app/.next/cache }
            - { name: tmp,   mountPath: /tmp }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - { name: cache, emptyDir: {} }
        - { name: tmp,   emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: finance-ui
  namespace: finance-assistant
spec:
  selector:
    app: finance-ui
  ports:
    - port: 80
      targetPort: 3000
---
# Split-auth ingresses, merged into one ALB via group.name=finance.
# Public ingress serves / (landing page) — no Cognito check, so the
# marketing page is indexable and fast. Protected ingress serves /app
# and /api/* — Cognito auth kicks in only when users click Sign in or
# hit an authenticated endpoint.
# Both use the same DNS name and certificate; the ALB picks the rule
# that matches the request path.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-ui-public
  namespace: finance-assistant
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:940019131157:certificate/2d6b2f41-9673-4c9e-a6ad-daa34982ced7
    # Merge with the protected ingress under a single ALB.
    alb.ingress.kubernetes.io/group.name: finance
    alb.ingress.kubernetes.io/group.order: "10"
    external-dns.alpha.kubernetes.io/hostname: finassist.elamaras.people.aws.dev
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
spec:
  ingressClassName: alb
  rules:
    - host: finassist.elamaras.people.aws.dev
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: finance-ui
                port:
                  number: 80
          - path: /_next
            pathType: Prefix
            backend:
              service:
                name: finance-ui
                port:
                  number: 80
          - path: /favicon.ico
            pathType: Exact
            backend:
              service:
                name: finance-ui
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-ui-protected
  namespace: finance-assistant
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:940019131157:certificate/2d6b2f41-9673-4c9e-a6ad-daa34982ced7
    alb.ingress.kubernetes.io/group.name: finance
    alb.ingress.kubernetes.io/group.order: "20"
    # Cognito auth applies to every path on this ingress.
    alb.ingress.kubernetes.io/auth-type: cognito
    alb.ingress.kubernetes.io/auth-idp-cognito: |
      {
        "UserPoolArn": "arn:aws:cognito-idp:us-west-2:940019131157:userpool/us-west-2_Gpb9hjoLH",
        "UserPoolClientId": "3uelp9pbba5ijnph9ej03jclvi",
        "UserPoolDomain": "openclaw-finance-940019131157"
      }
    alb.ingress.kubernetes.io/auth-scope: "openid email profile"
    alb.ingress.kubernetes.io/auth-session-cookie: AWSELBAuthSessionCookie
    alb.ingress.kubernetes.io/auth-session-timeout: '3600'
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
spec:
  ingressClassName: alb
  rules:
    - host: finassist.elamaras.people.aws.dev
      http:
        paths:
          - path: /app
            pathType: Prefix
            backend:
              service:
                name: finance-ui
                port:
                  number: 80
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: finance-ui
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: finance-ui
                port:
                  number: 80
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: finance-ui
                port:
                  number: 80
