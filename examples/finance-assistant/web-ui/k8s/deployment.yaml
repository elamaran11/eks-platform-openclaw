apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-ui
  namespace: finance-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finance-ui
  template:
    metadata:
      labels:
        app: finance-ui
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        runAsNonRoot: true
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          # nginx reverse proxy fronting OpenClaw Control UI (finance-sandbox:18789)
          # Replaced via scripts/render-finance-ui.sh — DO NOT hand-edit
          image: 940019131157.dkr.ecr.us-west-2.amazonaws.com/finance-ui:v0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: GATEWAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-gateway-auth
                  key: token
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities: { drop: [ALL] }
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - { name: tmp,          mountPath: /tmp }
            - { name: nginx-cache,  mountPath: /var/cache/nginx }
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - { name: tmp,         emptyDir: {} }
        - { name: nginx-cache, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: finance-ui
  namespace: finance-assistant
spec:
  selector:
    app: finance-ui
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-ui
  namespace: finance-assistant
  annotations:
    # AWS Load Balancer Controller (ships with EKS Auto Mode)
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:940019131157:certificate/2d6b2f41-9673-4c9e-a6ad-daa34982ced7
    # Cognito auth (values substituted post-`terraform apply`)
    alb.ingress.kubernetes.io/auth-type: cognito
    alb.ingress.kubernetes.io/auth-idp-cognito: |
      {
        "UserPoolArn": "arn:aws:cognito-idp:us-west-2:940019131157:userpool/us-west-2_Gpb9hjoLH",
        "UserPoolClientId": "3uelp9pbba5ijnph9ej03jclvi",
        "UserPoolDomain": "openclaw-finance-940019131157"
      }
    alb.ingress.kubernetes.io/auth-scope: "openid email profile"
    alb.ingress.kubernetes.io/auth-session-cookie: AWSELBAuthSessionCookie
    alb.ingress.kubernetes.io/auth-session-timeout: '3600'
    # external-dns picks up this host from the rule below
    external-dns.alpha.kubernetes.io/hostname: finassist.elamaras.people.aws.dev
spec:
  ingressClassName: alb
  rules:
    - host: finassist.elamaras.people.aws.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finance-ui
                port:
                  number: 80
